name: Refresh profile stats

on:
  schedule:
    - cron: "43 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-stats-cards.mjs"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate static stats cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: JOJOCrazy123
        run: node scripts/generate-stats-cards.mjs assets

      - name: Commit refreshed cards
        run: |
          if git diff --quiet -- assets/github-stats.svg assets/top-languages.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-languages.svg
          git commit -m "chore: refresh profile stats"
          git push
