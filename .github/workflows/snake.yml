name: Generate contribution snake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JOJOCrazy123
          outputs: |
            dist/github-contribution-grid-snake-tech.svg?color_snake=#5b21b6&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353

      - name: Make the snake grow after every contribution
        run: node scripts/make-snake-grow.mjs dist/github-contribution-grid-snake-tech.svg

      - name: Publish SVG files to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
