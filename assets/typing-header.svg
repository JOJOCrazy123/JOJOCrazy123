<svg xmlns="http://www.w3.org/2000/svg" width="760" height="96" viewBox="0 0 760 96" role="img" aria-labelledby="title description">
  <title id="title">Hi there, I'm Hanchen Qiu</title>
  <desc id="description">A bold blue typewriter animation on a white background.</desc>

  <rect width="760" height="96" rx="16" fill="#ffffff" />
  <rect x="1" y="1" width="758" height="94" rx="15" fill="none" stroke="#d0d7de" stroke-width="2" />

  <defs>
    <filter id="blue-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="typing-mask">
      <rect x="52" y="20" width="0" height="60">
        <animate
          attributeName="width"
          values="0;656;656;0;0"
          keyTimes="0;0.56;0.76;0.94;1"
          dur="6s"
          repeatCount="indefinite"
        />
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#typing-mask)">
    <text
      x="52"
      y="61"
      fill="#0969da"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="34"
      font-weight="800"
      letter-spacing="0.2"
      filter="url(#blue-glow)"
    >Hi there, I'm Hanchen Qiu 👋</text>
  </g>

  <rect x="52" y="26" width="4" height="44" rx="2" fill="#0969da">
    <animate
      attributeName="x"
      values="52;708;708;52;52"
      keyTimes="0;0.56;0.76;0.94;1"
      dur="6s"
      repeatCount="indefinite"
    />
    <animate attributeName="opacity" values="1;1;0;1" dur="0.8s" repeatCount="indefinite" />
  </rect>
</svg>
