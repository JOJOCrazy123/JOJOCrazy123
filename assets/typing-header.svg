<svg xmlns="http://www.w3.org/2000/svg" width="760" height="96" viewBox="0 0 760 96" role="img" aria-labelledby="title description">
  <title id="title">Hi there, I'm Hanchen Qiu</title>
  <desc id="description">A centered bright blue typewriter animation on a white background.</desc>

  <rect width="760" height="96" fill="#ffffff" />

  <defs>
    <clipPath id="typing-mask">
      <rect x="80" y="20" width="0" height="60">
        <animate
          attributeName="width"
          values="0;600;600;0;0"
          keyTimes="0;0.56;0.76;0.94;1"
          dur="6s"
          repeatCount="indefinite"
        />
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#typing-mask)">
    <text
      x="380"
      y="61"
      fill="#218bff"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="34"
      font-weight="400"
      letter-spacing="0.2"
      text-anchor="middle"
    >Hi there, I'm Hanchen Qiu 👋</text>
  </g>

  <rect x="80" y="26" width="3" height="44" rx="1.5" fill="#218bff">
    <animate
      attributeName="x"
      values="80;680;680;80;80"
      keyTimes="0;0.56;0.76;0.94;1"
      dur="6s"
      repeatCount="indefinite"
    />
    <animate attributeName="opacity" values="1;1;0;1" dur="0.8s" repeatCount="indefinite" />
  </rect>
</svg>
